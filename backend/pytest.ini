[pytest]
# Cobertura enfocada en el código sensible a seguridad (auth, headers, RBAC,
# rate limit, config, persistencia). Los módulos de ML (app/ml) son numéricos
# y se validan aparte con el flujo end-to-end; no inflan/hunden este umbral.
addopts =
    -q
    --cov=app.core
    --cov=app.api
    --cov=app.db
    --cov=app.main
    --cov-report=term-missing
    --cov-report=xml
    --cov-fail-under=80
testpaths = tests
python_files = test_*.py
python_functions = test_*
